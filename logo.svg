<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="120" rx="15" fill="url(#grad)"/>
  <text x="200" y="55" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#e94560" text-anchor="middle">ZEITGEIST</text>
  <text x="200" y="85" font-family="Arial, sans-serif" font-size="18" fill="#eaeaea" text-anchor="middle" letter-spacing="8">NEWS</text>
  <circle cx="320" cy="30" r="8" fill="#e94560">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="90" r="5" fill="#4ecca3">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>